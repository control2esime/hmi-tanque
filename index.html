<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HMI Tanque</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family: Arial;
text-align:center;
background:#111;
color:white;
}

h1{
margin-top:20px;
}

.valor{
font-size:40px;
margin:10px;
}

canvas{
background:white;
margin-top:20px;
}
</style>
</head>

<body>

<h1>HMI Tanque</h1>

<div class="valor">Nivel: <span id="nivel">--</span></div>
<div class="valor">Flujo: <span id="flujo">--</span></div>
<div class="valor">Temp: <span id="temp">--</span></div>

<canvas id="grafica" width="600" height="300"></canvas>

<script>

const url = "https://script.google.com/macros/s/AKfycbytx-5MJ6jSjGWVcb2XcFDUNm62UzIfE-Ve4N9UaTRihtGtpc27VleDFSAphxG7VzQ1/exec";

let chart;

async function cargarDatos(){

try{

const response = await fetch(url);
const data = await response.json();

const datosValidos = data.filter(f => f[1] !== "");

const labels = datosValidos.map(f => f[0]);
const nivel = datosValidos.map(f => f[1]);
const flujo = datosValidos.map(f => f[2]);
const temp = datosValidos.map(f => f[3]);

const ultimo = datosValidos[datosValidos.length-1];

document.getElementById("nivel").innerText = ultimo[1];
document.getElementById("flujo").innerText = ultimo[2];
document.getElementById("temp").innerText = ultimo[3];

if(!chart){

const ctx = document.getElementById("grafica");

chart = new Chart(ctx,{
type:'line',
data:{
labels:labels,
datasets:[
{
label:'Nivel',
data:nivel,
borderWidth:2
},
{
label:'Flujo',
data:flujo,
borderWidth:2
},
{
label:'Temp',
data:temp,
borderWidth:2
}
]
}
});

}else{

chart.data.labels = labels;
chart.data.datasets[0].data = nivel;
chart.data.datasets[1].data = flujo;
chart.data.datasets[2].data = temp;

chart.update();

}

}catch(e){

console.log(e);

}

}

cargarDatos();

setInterval(cargarDatos,5000);

</script>

</body>
</html>
